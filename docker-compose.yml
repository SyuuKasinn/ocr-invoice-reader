services:
  ocr-invoice-reader:
    build: .
    image: ocr-invoice-reader:latest
    container_name: ocr-invoice-reader

    volumes:
      - ./data:/app/data
      - ./results:/app/results

    environment:
      - PYTHONUNBUFFERED=1
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8

    command: >
      ocr-extract
      /app/data/invoice.pdf
      --output-dir /app/results

    # Device is auto-detected. To expose an NVIDIA GPU, uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
